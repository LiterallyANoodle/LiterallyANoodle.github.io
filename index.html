	<font>
		<style type="text/css">
			html, body {
				font-size: 15px !important;
				line-height: 1.625 !important;
				color: #FFFFFF;
				font-family: Georgia;
				width: 100%;
				height: 100%;
			}

			a {
				text-decoration: none;
				color: whitesmoke;
			}

			table, th, td {
				border-style: ridge;
				border: 5px solid pink;
				padding: 5px;
				margin: 0px;
			}

			tbody {
				padding: 10px;
			}

			img {
				margin: 0px;
				display: table-cell;
				border: none;
				padding: 0px;
				vertical-align: middle;
			}

			.centerBox {
				margin: 0;
				position: absolute;
				top: 36%;
				left: 50%;
				-ms-transform: translate(-50%, -50%);
				transform: translate(-50%, -50%);
			}

			.center {
				margin: 0;
				position: inherit;
				top: 50%;
				left: 50%;
				/*-ms-transform: translate(-50%, -50%);
				transform: translate(-50%, -50%);
*/			}

			.frontButtonPress {
				animation-duration: 0.25s;
				animation-name: frontButtonPress;

				padding: 10px 20px;
				font-size: 15px;
				text-align: center;
				cursor: pointer;
				color: indigo;
				border: 3px solid #FFFFFF;
				background-color: indigo;
				border-radius: 10px;
				transition-duration: 0.4s;
			}

			@keyframes frontButtonPress {
				from {padding: 15px 25px;}
				to {padding: 10px 20px;}
			}

			.frontButtonRelease {
				animation-duration: 0.5s;
				animation-name: frontButtonRelease;
				animation-fill-mode: forwards;

				padding: 105vw 205vh;
				font-size: 15px;
				text-align: center;
				cursor: pointer;
				color: indigo;
				border: 3px solid #FFFFFF;
				background-color: indigo;
				border-radius: 10px;
				transition-duration: 0.4s;
			}

			@keyframes frontButtonRelease {
				0% {padding: 10px 20px;}
				99% {padding: 105vw 205vh; visibility: visible;}
				100% {padding: 105vw 205vh; visibility: hidden;}
			}

			.frontButton {
				padding: 15px 25px;
				font-size: 15px;
				text-align: center;
				cursor: pointer;
				color: white;
				border: 3px solid #FFFFFF;
				background-color: black;
				border-radius: 10px;
				transition-duration: 0.4s;
			}
			.frontButton:hover {
				transition-duration: 0.4s;
				background-color: indigo;
			}

			.water {
				animation-duration: 3s;
				animation-name: water;

				background-image: linear-gradient(aquamarine, indigo);
				/*padding: 100vw 100vh;*/
				/*margin: 100%;*/
				position: absolute;
			}


			@keyframes water {
				from {opacity: 0%;}
				to {opacity: 100%;}
			}
			/*.frontButtonHeld {

			}*/

	</font>
